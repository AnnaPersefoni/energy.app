<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styleChoosePage.css">
    <link rel="stylesheet" href="css/all.css">
    <title>Animation Login form Create</title>
</head>
<body>
<section>
	<div class="color"></div>
	<div class="color"></div>
	<div class="color"></div>
	<div class="login-box">
		<div class="login-square" style="--i:0"></div>
		<div class="login-square" style="--i:1"></div>
		<div class="login-square" style="--i:2"></div>
		<div class="login-square" style="--i:3"></div>
		<div class="login-square" style="--i:4"></div>
        <div class="login-square" style="--i:5"></div>
		<!-- <div class="login-square" style="--i:6"></div> -->
		<div class="container"data-tilt>
			<div class="choose-form">
				<form action="/choose_form" method="POST">
					<div class="form-group col">
						<label for="cmethod">Choose the way you will enter your data</label>
						<br>
						<select id="cmethod" name="cmethod" class="form-control">
							<option value="api">IP</option>
							<option value="menu">Menu</option>
						</select>
					</div>

					
					<input type="submit" value="Next" id="sub">
				</form>
			</div>
		</div>
	</div>
</section>

<!-- <script src="/static/vanilla-tilt.js"></script> -->
</body>
</html>
